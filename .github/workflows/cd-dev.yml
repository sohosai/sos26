name: CD-dev

on:
  push:
    branches:
      - main

concurrency:
  group: cd-dev-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  CLOUDFLARE_ACCOUNT_NAME: jsys
  VITE_API_BASE_URL: https://api.dev.sos26.sohosai.com
  VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY_DEV }}
  VITE_FIREBASE_AUTH_DOMAIN: sos26-dev.firebaseapp.com
  VITE_FIREBASE_PROJECT_ID: sos26-dev
  VITE_VAPID_PUBLIC_KEY: BPWfimwhT9AbgPf6aUT3e_ZdGSdhtxxXovv36i7cTb3YNUKghh3yTI2H63XpYEtDjGLuUfuOFZ3bhRgmtGH4Pcs

jobs:
  deploy-web:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Cache Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-
            ${{ runner.os }}-bun-

      - name: Cache Turbo local cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.ref_name }}-
            ${{ runner.os }}-turbo-main-

      - run: bun install --frozen-lockfile
      - run: bun run build --filter=@sos26/web

      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env dev
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: "ghcr.io/sohosai/sos26-api"
          tags: |
            type=sha
            type=raw,value=dev

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
