name: CD-zoo

on:
  workflow_dispatch:

concurrency:
  group: cd-zoo-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  CLOUDFLARE_ACCOUNT_NAME: jsys
  VITE_API_BASE_URL: https://sos26-api-zoo.sohosai.com
  VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY_ZOO }}
  VITE_FIREBASE_AUTH_DOMAIN: sos26-zoo.firebaseapp.com
  VITE_FIREBASE_PROJECT_ID: sos26-zoo
  VITE_VAPID_PUBLIC_KEY: BCjGiMe7cp2YfmO9W-_tYfMyOoTagRsYPmhnjNA95yukCkRJzEa0xg1aPmCukokb-bdVTW8OcKlKtn1_b07Q0ZM
  VITE_SENTRY_DSN: https://cb9fca6cc6a7f215167519ad1f7486ae@o4507113970466816.ingest.us.sentry.io/4511060895531008
  VITE_SENTRY_ENVIRONMENT: zoo
  VITE_SENTRY_ORG: jsys
  VITE_SENTRY_PROJECT: sos26-web
  VITE_SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  deploy-web:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Cache Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-
            ${{ runner.os }}-bun-

      - name: Cache Turbo local cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.ref_name }}-
            ${{ runner.os }}-turbo-main-

      - run: bun install --frozen-lockfile
      - run: bun run build --filter=@sos26/web

      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env zoo
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: "ghcr.io/sohosai/sos26-api"
          tags: |
            type=sha
            type=raw,value=zoo

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
